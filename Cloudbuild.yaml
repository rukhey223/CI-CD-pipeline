steps:
# Step 1: Install dependencies and run tests
- name: 'python:3.12-slim'
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      pip install --upgrade pip
      pip install -r requirements.txt
      pytest --maxfail=1 --disable-warnings -q

# Step 2: Build Docker image
- name: 'gcr.io/cloud-builders/docker'
  args:
    - 'build'
    - '-t'
    - 'us-central1-docker.pkg.dev/$PROJECT_ID/my-repo/app:$SHORT_SHA'
    - '.'

# Step 3: Push image to Artifact Registry
- name: 'gcr.io/cloud-builders/docker'
  args:
    - 'push'
    - 'us-central1-docker.pkg.dev/$PROJECT_ID/my-repo/app:$SHORT_SHA'

# Step 4: Update manifest in environment repo
- name: 'gcr.io/cloud-builders/gcloud'
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      # 1. Set up Git identity
      git config --global user.email "cloudbuild@google.com"
      git config --global user.name "Cloud Build"

      # 2. Make sure you are on the main branch locally
      git checkout main || git checkout -b main

      # 3. Pull any fresh changes (like the kubernetes.yaml you just added)
      git pull https://$_GH_TOKEN@github.com/rukhey223/CI-CD-pipeline.git main

      # 4. Run the sed replacement command on the root file
      sed -i "s|image: .*|image: us-central1-docker.pkg.dev/$PROJECT_ID/my-repo/app:$SHORT_SHA|g" kubernetes.yaml

      # 5. Stage, commit, and push back to GitHub safely
      git add kubernetes.yaml
      git commit -m "Update application deployment image tag to $SHORT_SHA [skip ci]"
      git push https://$_GH_TOKEN@github.com/rukhey223/CI-CD-pipeline.git main
      
      # 2. Update the image tag
      sed -i "s|image: .*|image: us-central1-docker.pkg.dev/\$PROJECT_ID/my-repo/app:$SHORT_SHA|g" kubernetes.yaml
      
      # 3. Push changes back to GitHub
      git config user.email "cloudbuild@example.com"
      git config user.name "cloudbuild"
      git add kubernetes.yaml
      git commit -m "Automated image update to $SHORT_SHA"
      git push origin main
    
# Step 5: Deploy to GKE
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: 'bash'
  args:
    - '-c'
    - |
      gcloud container clusters get-credentials gitops-cluster --zone us-central1 --project glass-stratum-495015-g7
      kubectl apply -f gitops-env/kubernetes.yaml

options:
  logging: CLOUD_LOGGING_ONLY
